version: 2.1

jobs:
  typescript-package:
    docker:
      - image: cimg/node:22.21
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - adaptive-island-npm-v1-{{ checksum "client/typescript/package-lock.json" }}
      - run:
          name: Install TypeScript dependencies
          command: cd client/typescript && npm ci
      - save_cache:
          key: adaptive-island-npm-v1-{{ checksum "client/typescript/package-lock.json" }}
          paths:
            - ~/.npm
      - run:
          name: TypeScript lint
          command: cd client/typescript && npm run lint
      - run:
          name: TypeScript coverage
          command: cd client/typescript && npm run test:coverage
      - run:
          name: Upload coverage to Codecov
          command: |
            if [ -z "${CODECOV_TOKEN:-}" ]; then
              echo "CODECOV_TOKEN is not configured; skipping Codecov upload."
              exit 0
            fi
            curl -fsSLO https://cli.codecov.io/latest/linux/codecov
            chmod +x codecov
            ./codecov --auto-load-params-from CircleCI upload-process \
              -Z \
              -t "$CODECOV_TOKEN" \
              -C "$CIRCLE_SHA1" \
              -f client/typescript/coverage/lcov.info \
              --disable-search
      - run:
          name: TypeScript build
          command: cd client/typescript && npm run build
      - run:
          name: Local SDK demo
          command: cd client/typescript && node ../../examples/local-synthetic-demo/sdk-cache-demo.mjs
      - run:
          name: Package dry run
          command: cd client/typescript && npm pack --dry-run

  python-package:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - adaptive-island-pip-v1-{{ checksum "pyproject.toml" }}
      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            python -m pip install -e '.[dev]'
      - save_cache:
          key: adaptive-island-pip-v1-{{ checksum "pyproject.toml" }}
          paths:
            - ~/.cache/pip
      - run:
          name: Python tests
          command: pytest tests/python
      - run:
          name: Python lint
          command: ruff check .

workflows:
  package-check:
    jobs:
      - typescript-package
      - python-package
